<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="60" viewBox="0 0 320 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .block { fill: white; }
    </style>
  </defs>
  <!-- Black background -->
  <rect width="320" height="60" fill="black"/>
  
  <!-- Letter A -->
  <g id="A" transform="translate(10, 10)">
    <!-- Top bar -->
    <rect class="block" x="5" y="0" width="20" height="5"/>
    <!-- Left side -->
    <rect class="block" x="0" y="5" width="10" height="5"/>
    <rect class="block" x="0" y="10" width="30" height="5"/>
    <rect class="block" x="0" y="15" width="10" height="5"/>
    <rect class="block" x="0" y="20" width="10" height="20"/>
    <!-- Right side -->
    <rect class="block" x="20" y="5" width="10" height="5"/>
    <rect class="block" x="20" y="15" width="10" height="5"/>
    <rect class="block" x="20" y="20" width="10" height="20"/>
  </g>
  
  <!-- Letter I -->
  <g id="I" transform="translate(50, 10)">
    <rect class="block" x="0" y="0" width="10" height="40"/>
  </g>
  
  <!-- Letter N -->
  <g id="N" transform="translate(80, 10)">
    <!-- Left column -->
    <rect class="block" x="0" y="0" width="10" height="40"/>
    <!-- Diagonal -->
    <rect class="block" x="10" y="5" width="5" height="5"/>
    <rect class="block" x="15" y="10" width="5" height="5"/>
    <rect class="block" x="20" y="15" width="5" height="5"/>
    <rect class="block" x="25" y="20" width="5" height="5"/>
    <!-- Right column -->
    <rect class="block" x="30" y="0" width="10" height="40"/>
  </g>
  
  <!-- Letter W -->
  <g id="W" transform="translate(140, 10)">
    <!-- Left column -->
    <rect class="block" x="0" y="0" width="10" height="40"/>
    <!-- Middle left -->
    <rect class="block" x="10" y="20" width="5" height="15"/>
    <rect class="block" x="15" y="25" width="5" height="10"/>
    <!-- Middle -->
    <rect class="block" x="20" y="20" width="10" height="5"/>
    <!-- Middle right -->
    <rect class="block" x="30" y="25" width="5" height="10"/>
    <rect class="block" x="35" y="20" width="5" height="15"/>
    <!-- Right column -->
    <rect class="block" x="40" y="0" width="10" height="40"/>
  </g>
</svg>